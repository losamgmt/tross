# Railway Nixpacks Configuration
# Forces Node 22 LTS and configures proper build for monorepo

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --prefer-offline --no-audit --legacy-peer-deps"]

[phases.build]
cmds = []

